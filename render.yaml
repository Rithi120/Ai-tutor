services:
  - type: web
    name: learnova
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: AI_MODE
        value: live
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: learnova-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: GROQ_TUTOR_MODEL
        value: openai/gpt-oss-20b
      - key: GROQ_FAST_MODEL
        value: llama-3.1-8b-instant
      - key: LESSON_TOKEN_LIMIT
        value: "1800"
      - key: ANSWER_TOKEN_LIMIT
        value: "1100"
      - key: CHAT_TOKEN_LIMIT
        value: "350"
      - key: TRANSLATE_TOKEN_LIMIT
        value: "2500"
      - key: PROJECT_TOKEN_LIMIT
        value: "5000"

databases:
  - name: learnova-db
    plan: free
    databaseName: learnova
    user: learnova
